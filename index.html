<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程規劃APP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #07070f;
        }
        .card {
            background-color: #0f1020;
            border: 1px solid #1a1d35;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            color: #fff;
        }
        .input:focus {
            border-color: #7c6cff;
        }
        .button {
            background-image: linear-gradient(to right, #7c6cff, #00d4ff);
        }
        .button:hover {
            background-image: linear-gradient(to right, #00d4ff, #7c6cff);
        }
    </style>
</head>
<body class="text-white">

    <div class="max-w-2xl mx-auto p-4">
        <!-- 頂部標題列 -->
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl">行程規劃APP</h1>
            <span id="eventCount" class="text-xl text-blue-400">行程數: 0</span>
        </header>

        <!-- 新增行程 -->
        <div class="card">
            <h2 class="text-xl mb-2">新增行程</h2>
            <input id="eventName" type="text" placeholder="行程名稱" class="input block w-full p-2 mb-2 bg-gray-900" />
            <input id="eventTime" type="time" class="input block w-full p-2 mb-2 bg-gray-900" />
            <button id="addEvent" class="button text-white w-full p-2 mt-2 rounded">新增行程</button>
        </div>

        <!-- 查看當天行程 -->
        <div class="card">
            <h2 class="text-xl mb-2">當天行程列表</h2>
            <ul id="eventList" class="divide-y divide-blue-500"></ul>
        </div>

        <!-- 底部狀態列 -->
        <footer class="flex justify-center items-center mt-4">
            <span class="text-sm text-gray-400">享受計劃，合理安排時間。</span>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const eventNameInput = document.getElementById('eventName');
            const eventTimeInput = document.getElementById('eventTime');
            const addEventButton = document.getElementById('addEvent');
            const eventList = document.getElementById('eventList');
            const eventCount = document.getElementById('eventCount');

            const loadEvents = () => {
                const events = JSON.parse(localStorage.getItem('events') || '[]');
                eventList.innerHTML = '';
                events.forEach(event => {
                    const listItem = document.createElement('li');
                    listItem.className = 'p-2 hover:bg-gray-800';
                    listItem.textContent = `${event.time} - ${event.name}`;
                    eventList.appendChild(listItem);
                });
                eventCount.textContent = `行程數: ${events.length}`;
            };

            const saveEvent = (event) => {
                const events = JSON.parse(localStorage.getItem('events') || '[]');
                events.push(event);
                localStorage.setItem('events', JSON.stringify(events));
                loadEvents();
            };

            addEventButton.addEventListener('click', () => {
                const eventName = eventNameInput.value.trim();
                const eventTime = eventTimeInput.value;

                if (eventName && eventTime) {
                    saveEvent({ name: eventName, time: eventTime });
                    eventNameInput.value = '';
                    eventTimeInput.value = '';
                }
            });

            loadEvents();
        });
    </script>
</body>
</html>
